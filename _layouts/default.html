<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    <link rel="icon" type="image/png" href="{{ '/assets/images/favicon/favicon_yellow.jpg' | relative_url }}">
    <link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@400;700&family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="brand">
                <h1><a href="{{ '/' | relative_url }}">{{ site.title_beng }}</a></h1>
                <p class="subtitle">{{ site.description }}</p>
            </div>

            <nav class="top-nav">
                <a href="{{ '/' | relative_url }}" class="{% if page.url == '/' %}active{% endif %}">Projects</a>
                <!-- <a href="{{ '/' | relative_url }}" class="{% if page.url == '/' %}active{% endif %}">Hijibiji</a> -->
                <a href="{{ '/about/' | relative_url }}" class="{% if page.url == '/about/' %}active{% endif %}">About</a>
                
                <div class="header-actions">
                    <a href="https://instagram.com/peanut.it" aria-label="Instagram" target="_blank"><i data-lucide="instagram"></i></a>
                    <a href="mailto:prianka1618@gmail.com" aria-label="Email"><i data-lucide="mail"></i></a>
                    
                    <button id="theme-toggle" aria-label="Toggle Dark Mode">
                        <svg id="sun-icon" class="mode-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                        <svg id="moon-icon" class="mode-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    </button>
                </div>
            </nav>
        </div>
    </header>

    <main class="content">
        {{ content }}
    </main>
    <footer class="about-footer">
        <p>© 2026 {{ site.title }}. All rights reserved. Built with patience and pixels.</p>
    </footer>

    <button id="scroll-to-top" aria-label="Scroll to top">
        <i data-lucide="arrow-up"></i>
    </button>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Theme Toggle Logic
        const themeToggle = document.querySelector('#theme-toggle');
        const currentTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);

        themeToggle.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            let targetTheme = theme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', targetTheme);
            localStorage.setItem('theme', targetTheme);
        });

        // Scroll to Top Logic
        const scrollBtn = document.querySelector('#scroll-to-top');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                scrollBtn.classList.add('show');
            } else {
                scrollBtn.classList.remove('show');
            }
        });

        scrollBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>

<!-- bundle exec jekyll serve -->
