---
layout: default
---
<div id="detail-interface" class="{% if page.sidebar_view_enabled == false %}sidebar-hidden{% endif %}">
    
    <main class="unified-art-layout">
        <div class="centered-image-stack">
            <img src="{{ page.image | relative_url }}" alt="{{ page.title }}">
            
            {% for extra in page.extra_images %}
                <img src="{{ extra | relative_url }}" alt="{{ page.title }} detail">
            {% endfor %}
        </div>
    </main>

    <button id="sidebar-toggle" aria-label="Toggle Details">
        <i data-lucide="chevron-right" id="toggle-icon"></i>
    </button>

    <aside class="details-sidebar">
        <div class="details-content">
            <h1 class="detail-title">{{ page.title }}</h1>
            
            <div class="detail-tags">
                {% if page.medium %}<span>{{ page.medium }}</span>{% endif %}
                {% if page.year %}<span>{{ page.year }}</span>{% endif %}
            </div>

            <div class="description">
                {{ content }}
            </div>

            <a href="{{ '/' | relative_url }}" class="back-btn">
                <i data-lucide="arrow-left"></i> 
                <span>Back to Gallery</span>
            </a>
        </div>
    </aside>

    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
        <div id="lightbox-caption"></div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const layout = document.getElementById('detail-interface');
        const toggleBtn = document.getElementById('sidebar-toggle');

        if (toggleBtn && layout) {
            toggleBtn.addEventListener('click', () => {
                layout.classList.toggle('sidebar-hidden');
            });
        }
    });
</script>

<script>
    // code for lightbox
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");
    const closeBtn = document.querySelector(".lightbox-close");

    // Select all images in your detail stack
    document.querySelectorAll(".centered-image-stack img").forEach(img => {
        img.onclick = function() {
            lightbox.style.display = "flex";
            lightbox.style.alignItems = "center";
            lightboxImg.src = this.src;
        }
    });

    // Close when clicking the 'X'
    closeBtn.onclick = function() {
        lightbox.style.display = "none";
    }

    // Close when clicking anywhere outside the image
    lightbox.onclick = function(e) {
        if (e.target !== lightboxImg) {
            lightbox.style.display = "none";
        }
    }
    
    // Close with Escape key
    document.addEventListener('keydown', (e) => {
        if (e.key === "Escape") lightbox.style.display = "none";
    });
</script>
