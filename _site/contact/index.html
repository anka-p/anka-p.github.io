<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANKA PRIYA</title>
    <link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@400;700&family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="brand">
                <h1><a href="/">ANKA PRIYA</a></h1>
            </div>

            <nav class="top-nav">
                <a href="/" class="">Projects</a>
                <a href="/about/" class="">About</a>
                
                <div class="header-actions">
                    <a href="https://instagram.com/your-profile" aria-label="Instagram" target="_blank"><i data-lucide="instagram"></i></a>
                    <a href="mailto:your-email@example.com" aria-label="Email"><i data-lucide="mail"></i></a>
                    
                    <button id="theme-toggle" aria-label="Toggle Dark Mode">
                        <svg id="sun-icon" class="mode-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                        <svg id="moon-icon" class="mode-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    </button>
                </div>
            </nav>
        </div>
    </header>

    <main class="content">
        <div class="contact-container">
    <h2>Get in Touch</h2>
    <p>For inquiries regarding specific pieces, commissions, or collaborations, please use the form below.</p>

    <form action="https://formspree.io/f/your-id" method="POST" class="contact-form">
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" required="" />
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="_replyto" required="" />
        </div>
        <div class="form-group">
            <label>Message</label>
            <textarea name="message" rows="5" required=""></textarea>
        </div>
        <button type="submit" class="submit-btn">Send Message</button>
    </form>
</div>

    </main>

    <button id="scroll-to-top" aria-label="Scroll to top">
        <i data-lucide="arrow-up"></i>
    </button>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Theme Toggle Logic
        const themeToggle = document.querySelector('#theme-toggle');
        const currentTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);

        themeToggle.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            let targetTheme = theme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', targetTheme);
            localStorage.setItem('theme', targetTheme);
        });

        // Scroll to Top Logic
        const scrollBtn = document.querySelector('#scroll-to-top');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                scrollBtn.classList.add('show');
            } else {
                scrollBtn.classList.remove('show');
            }
        });

        scrollBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
